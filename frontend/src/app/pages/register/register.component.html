<form (ngSubmit)="register()">
  <input [(ngModel)]="name" name="name" placeholder="Name" class="w-full p-2 border mb-2" />

  <input [(ngModel)]="email" name="email" placeholder="Email" class="w-full p-2 border mb-2" />

  <input
    type="password"
    [(ngModel)]="password"
    name="password"
    placeholder="Password"
    class="w-full p-2 border mb-2"
  />

  <button type="submit" class="bg-green-500 text-white px-4 py-2">Register</button>
</form>
